<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farting Fruit - AI Emotional Reframer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'float-to-list': 'floatToList 0.7s cubic-bezier(0.25, 1, 0.50, 1) forwards',
                        'bounce-reveal': 'bounceReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                        'fruit-shake': 'fruitShake 0.4s ease-in-out infinite',
                        'fruit-chomp': 'fruitChomp 0.3s ease-in-out infinite',
                        'badge-pop': 'badgePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                    },
                    keyframes: {
                        floatToList: {
                            '0%': { transform: 'translate(0, 0) scale(0.4)', opacity: '0' },
                            '20%': { opacity: '0.95' },
                            '100%': { transform: 'translate(110px, -20px) scale(0.8)', opacity: '0' }
                        },
                        bounceReveal: {
                            '0%': { transform: 'scale(0.3) translateY(100px)', opacity: '0' },
                            '70%': { transform: 'scale(1.05) translateY(-10px)' },
                            '100%': { transform: 'scale(1) translateY(0)', opacity: '1' }
                        },
                        badgePop: {
                            '0%': { transform: 'translateX(30px) scale(0.7)', opacity: '0' },
                            '100%': { transform: 'translateX(0) scale(1)', opacity: '1' }
                        },
                        fruitShake: {
                            '0%, 100%': { transform: 'rotate(0deg) translateY(0)' },
                            '25%': { transform: 'rotate(2deg) translateY(-2px)' },
                            '75%': { transform: 'rotate(-2deg) translateY(2px)' }
                        },
                        fruitChomp: {
                            '0%, 100%': { transform: 'scaleY(1)' },
                            '50%': { transform: 'scaleY(0.85) scaleX(1.08)' }
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=VT323&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="relative w-full max-w-md bg-slate-900/90 border border-slate-800 rounded-[2.5rem] p-6 shadow-[0_0_50px_rgba(0,0,0,0.8)] flex flex-col justify-between min-h-[680px] overflow-hidden backdrop-blur-md">
        
        <!-- Header -->
        <div class="relative z-10 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-gradient-to-br from-amber-400 to-rose-500 p-2 rounded-2xl shadow-lg">
                    <span class="text-2xl select-none leading-none">🍐</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-amber-400 to-rose-300 bg-clip-text text-transparent">Farting Fruit</h1>
                    <p class="text-[10px] text-slate-400 font-mono tracking-wider">FRUITY COGNITIVE REFRAMER</p>
                </div>
            </div>
            <button id="settings-btn" class="text-slate-400 hover:text-amber-400 transition-colors p-2 rounded-xl bg-slate-800/50 border border-slate-800">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /></svg>
            </button>
        </div>

        <div class="mt-4 flex justify-center">
            <div class="px-4 py-1.5 rounded-full bg-slate-950 border border-slate-800 text-xs font-mono tracking-widest text-slate-500 uppercase flex items-center gap-2">
                <span id="diagnostic-dot" class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                <span id="diagnostic-label">System Idle</span>
            </div>
        </div>

        <div class="relative flex-1 flex items-center justify-between min-h-[260px] gap-3 px-2">
            <div id="fart-cloud-anchor" class="absolute left-[38%] top-[56%] w-2 h-2 pointer-events-none z-30"></div>
            <div id="fruit-character" class="w-40 h-40 transition-all duration-500 relative flex-shrink-0">
                <!-- Pear SVG remains same -->
                <svg viewBox="0 0 200 200" class="w-full h-full"><path d="M 100 50 C 70 50 45 90 45 135 C 45 170 80 180 100 180" fill="#a3e635" /><path d="M 100 50 C 130 50 157 90 157 135 C 157 170 120 180 100 180" fill="#bef264" /></svg>
            </div>
            <div id="emotion-list-panel" class="w-36 h-[200px] flex flex-col justify-start bg-slate-950/45 border border-slate-800/80 rounded-2xl p-2 relative overflow-y-auto backdrop-blur-sm">
                <div id="emotion-list-items" class="flex flex-col gap-1.5"></div>
            </div>
        </div>

        <div id="feedback-card" class="relative z-10 hidden my-4 transform opacity-0">
            <div class="bg-gradient-to-b from-slate-800 to-slate-900 border border-slate-700 p-5 rounded-3xl shadow-xl space-y-3">
                <p id="sarcastic-reply" class="text-sm italic text-slate-200 leading-relaxed"></p>
                <button id="copy-btn" class="text-[11px] bg-slate-950 px-3 py-1.5 rounded-xl border border-slate-800">Copy</button>
            </div>
        </div>

        <div class="relative z-10 space-y-3">
            <textarea id="user-input" rows="3" placeholder="Vent your raw feelings..." class="w-full bg-slate-950/85 text-sm p-4 rounded-3xl border border-slate-800 focus:outline-none focus:border-amber-500"></textarea>
            <button id="submit-btn" class="w-full bg-gradient-to-r from-amber-500 to-rose-600 font-bold py-4 rounded-2xl text-sm">Digest & Roast Me</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-[2rem] p-6">
            <h2 class="text-lg font-bold mb-4">OpenRouter Settings</h2>
            <input type="password" id="api-key-input" placeholder="sk-or-v1-..." class="w-full bg-slate-950 p-3 rounded-xl border border-slate-800 mb-3">
            <button id="save-settings" class="w-full bg-amber-500 py-3 rounded-xl font-bold text-xs uppercase">Save Settings</button>
        </div>
    </div>

    <script>
        const FALLBACK_API_KEY = "OPENROUTER_SECRET_TOKEN";
        const apiKeyInput = document.getElementById('api-key-input');
        const settingsModal = document.getElementById('settings-modal');
        const settingsBtn = document.getElementById('settings-btn');
        const saveSettingsBtn = document.getElementById('save-settings');

        // Logic Change 1: Auto-popup removed from load
        window.addEventListener('load', () => {
            const savedKey = localStorage.getItem('or_groot_key');
            if (savedKey) {
                apiKeyInput.value = savedKey;
            } else if (FALLBACK_API_KEY !== "OPENROUTER_SECRET_TOKEN") {
                apiKeyInput.value = FALLBACK_API_KEY;
            }
        });

        function toggleModal(show) { settingsModal.classList.toggle('hidden', !show); }
        settingsBtn.addEventListener('click', () => toggleModal(true));

        // Logic Change 2: Improved Save/Clear functionality
        saveSettingsBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('or_groot_key', key);
            } else {
                localStorage.removeItem('or_groot_key');
                if (FALLBACK_API_KEY !== "OPENROUTER_SECRET_TOKEN") {
                    apiKeyInput.value = FALLBACK_API_KEY;
                }
            }
            toggleModal(false);
        });

        // Submit logic remains the same (checks for key at runtime)
        document.getElementById('submit-btn').addEventListener('click', () => {
            const currentKey = apiKeyInput.value.trim() || localStorage.getItem('or_groot_key') || (FALLBACK_API_KEY !== "OPENROUTER_SECRET_TOKEN" ? FALLBACK_API_KEY : null);
            if (!currentKey || currentKey === "OPENROUTER_SECRET_TOKEN") {
                toggleModal(true);
                return;
            }
            // Proceed with API call...
        });
    </script>
</body>
</html>
